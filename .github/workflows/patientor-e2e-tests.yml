name: Patientor E2E Tests

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --ipc=host

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install patientor backend dependencies
      working-directory: ./patientor/backend
      run: npm ci --legacy-peer-deps

    - name: Install patientor frontend dependencies
      working-directory: ./patientor/frontend
      run: npm ci --legacy-peer-deps

    - name: Build patientor frontend
      working-directory: ./patientor/frontend
      run: npm run build

    - name: Install e2e test dependencies
      working-directory: ./patientor-tests
      run: npm ci

    - name: Run E2E tests
      shell: bash
      run: |
        set -euo pipefail

        cleanup() {
          kill "$(cat /tmp/patientor-backend.pid)" 2>/dev/null || true
          kill "$(cat /tmp/patientor-frontend.pid)" 2>/dev/null || true
        }

        trap cleanup EXIT

        (
          cd patientor/backend
          npm start > /tmp/patientor-backend.log 2>&1 &
          echo $! > /tmp/patientor-backend.pid
        )

        (
          cd patientor/frontend
          npm run preview -- --host 127.0.0.1 --port 5173 > /tmp/patientor-frontend.log 2>&1 &
          echo $! > /tmp/patientor-frontend.pid
        )

        if ! npx wait-on http://localhost:3001/api/ping http://127.0.0.1:5173 --timeout 60000; then
          echo "Patientor backend log:"
          cat /tmp/patientor-backend.log || true
          echo "Patientor frontend log:"
          cat /tmp/patientor-frontend.log || true
          exit 1
        fi

        cd patientor-tests
        npm test

    - name: Upload test report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: playwright-report
        path: patientor-tests/playwright-report/
        retention-days: 30
